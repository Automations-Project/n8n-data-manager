<?xml version="1.0" encoding="UTF-8"?>
<!--
  n8n-manager hero — LIGHT variant.

  Same composition as hero.svg with a light palette:
    Background: cream → ivory gradient
    Accents: n8n pink (#d63977) + terminal cyan (#1A84A0)
    Text: deep navy (#13162a, the logo's anchor dark)
  ICON SLOT inlines n8n-manager.svg (pink ring, dark navy prompt).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img"
     aria-label="n8n-manager — Backup, Restore, Migrate" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="55%"  stop-color="#F5F1F8"/>
      <stop offset="100%" stop-color="#FBE6EF"/>
    </linearGradient>

    <radialGradient id="glowPink" cx="0.18" cy="0.42" r="0.55">
      <stop offset="0%"   stop-color="#d63977" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="#d63977" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d63977" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="0.86" cy="0.62" r="0.50">
      <stop offset="0%"   stop-color="#36B9D5" stop-opacity="0.18"/>
      <stop offset="60%"  stop-color="#36B9D5" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#36B9D5" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#13162a" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>

    <filter id="softshadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.30"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#13162a"/>
      <stop offset="100%" stop-color="#3a2148"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>
  <rect width="1200" height="360" fill="url(#glowPink)"/>
  <rect width="1200" height="360" fill="url(#glowCyan)"/>

  <!-- Decorative flow-graph -->
  <g stroke="#13162a" stroke-opacity="0.18" fill="none" stroke-width="1.5">
    <path d="M150 90 C 280 90, 320 170, 450 170" stroke-dasharray="4 6"/>
    <path d="M450 170 C 580 170, 620 250, 750 250" stroke-dasharray="4 6"/>
    <path d="M750 250 C 880 250, 920 130, 1050 130" stroke-dasharray="4 6"/>
  </g>
  <g fill="#d63977">
    <circle cx="150"  cy="90"  r="6"/>
    <circle cx="450"  cy="170" r="6"/>
    <circle cx="750"  cy="250" r="6"/>
    <circle cx="1050" cy="130" r="6"/>
  </g>

  <!-- Faint shell-prompt motif behind the wordmark -->
  <g fill="#13162a" fill-opacity="0.05" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="40" y="312" font-size="180" font-weight="700">$_</text>
  </g>

  <!-- ═════════════ ICON SLOT ═════════════ -->
  <g id="ICON_SLOT" transform="translate(520 100)" filter="url(#softshadow)">
    <rect x="0" y="0" width="160" height="160" rx="32" ry="32"
          fill="#FFFFFF" fill-opacity="0.85"
          stroke="#13162a" stroke-opacity="0.10" stroke-width="1.5"/>
    <g transform="translate(80 80) scale(0.5) translate(-128 -128)"
       fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="12">
      <g stroke="#d63977">
        <path d="M 50.06 83.00 A 90 90 0 0 1 109.29 39.97"/>
        <path d="M 146.71 39.97 A 90 90 0 0 1 205.94 83.00"/>
        <path d="M 217.51 118.59 A 90 90 0 0 1 194.88 188.22"/>
        <path d="M 164.60 210.21 A 90 90 0 0 1 91.40 210.21"/>
        <path d="M 61.12 188.22 A 90 90 0 0 1 38.49 118.59"/>
        <circle cx="128" cy="38" r="13"/>
        <circle cx="213.6" cy="100.2" r="13"/>
        <circle cx="180.9" cy="200.8" r="13"/>
        <circle cx="75.1" cy="200.8" r="13"/>
        <circle cx="42.4" cy="100.2" r="13"/>
      </g>
      <g stroke="#13162a">
        <polyline points="100,103 126,128 100,153"/>
        <line x1="130" y1="153" x2="156" y2="153"/>
      </g>
    </g>
  </g>
  <!-- ═════════════ /ICON SLOT ═════════════ -->

  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif">
    <text x="60" y="170" font-size="56" font-weight="800" fill="url(#title)" letter-spacing="-1.5">n8n-manager</text>
    <text x="60" y="208" font-size="20" font-weight="500" fill="#13162a" fill-opacity="0.72">
      Backup &#xb7; Restore &#xb7; Migrate &#xb7; Versioned in Git
    </text>
    <g transform="translate(60 240)" font-size="12" font-weight="600">
      <g>
        <rect x="0" y="0" width="98" height="26" rx="13" fill="#d63977" fill-opacity="0.10" stroke="#d63977" stroke-opacity="0.75"/>
        <text x="49" y="17" text-anchor="middle" fill="#a02458">Bash CLI</text>
      </g>
      <g transform="translate(110 0)">
        <rect x="0" y="0" width="118" height="26" rx="13" fill="#36B9D5" fill-opacity="0.10" stroke="#1A84A0" stroke-opacity="0.65"/>
        <text x="59" y="17" text-anchor="middle" fill="#155F76">SQLite + Postgres</text>
      </g>
      <g transform="translate(240 0)">
        <rect x="0" y="0" width="86" height="26" rx="13" fill="#FFB454" fill-opacity="0.18" stroke="#C57F1C" stroke-opacity="0.65"/>
        <text x="43" y="17" text-anchor="middle" fill="#7A5314">Self-hosted</text>
      </g>
    </g>
  </g>

  <g transform="translate(900 60)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#13162a" fill-opacity="0.70">
    <text x="240" y="0" text-anchor="end">curl -fsSL https://i.nskha.com/install.sh | sudo bash</text>
    <text x="240" y="22" text-anchor="end" fill-opacity="0.45">portable &#xb7; one-line install</text>
  </g>

  <line x1="60" y1="320" x2="1140" y2="320" stroke="#13162a" stroke-opacity="0.10"/>
  <text x="60" y="342" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11"
        fill="#13162a" fill-opacity="0.55">
    workflows &#xb7; credentials &#xb7; tags &#xb7; folders &#xb7; projects &#xb7; datatables &#xb7; variables
  </text>
  <text x="1140" y="342" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="11" fill="#13162a" fill-opacity="0.55">v5 &#xb7; canonical layout</text>
</svg>
